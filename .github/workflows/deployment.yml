name: deploy nixos configurations

on:
  workflow_dispatch:
  schedule:
    # Runs at 03:00 every Friday
    - cron: '0 3 * * 5'

  # push:
  #   branches:
  #     - main

jobs:
  deploy-nixos:
    runs-on: ubuntu-latest

    steps:
      - name: "checkout repo"
        uses: actions/checkout@v6
      - name: "instal nix"
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-26.05
      - run: nix-env -i colmena -f '<nixpkgs>'
      - name: "Tailscale"
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:testlab
          ping: xen.blue-edmontosaurus.ts.net
      - name: "Configure SSH"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_IP }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/external-machine.key
          chmod 600 ~/.ssh/external-machine.key
          cat >>~/.ssh/config <<END
          Host *
            User $SSH_USER
            IdentityFile ~/.ssh/external-machine.key
            StrictHostKeyChecking no
          END
      - name: "deployment"
        run: |
          colmena build
          colmena apply boot
